<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Meal Camera</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#000;--surface:#111318;--card:#1c1f2b;--text:#f0f2f5;--muted:#7a7f94;--accent:#ff6b35;--accent2:#ff8c5a;--green:#34d399;--border:#2a2d3a;--blue:#3b82f6;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-text-size-adjust:100%;touch-action:manipulation;}

.cam{position:relative;width:100%;height:100vh;display:flex;flex-direction:column;background:#000;}
video{flex:1;width:100%;object-fit:cover;}
canvas{display:none;}
.cam-top{position:absolute;top:0;left:0;right:0;padding:20px 16px 40px;background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);z-index:2;text-align:center;}
.cam-top h3{font-size:15px;font-weight:500;}
.cam-top .sub{font-size:11px;color:var(--muted);margin-top:4px;}
.crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;z-index:1;pointer-events:none;border:2px solid rgba(255,107,53,0.3);border-radius:16px;}
.cam-bottom{position:absolute;bottom:0;left:0;right:0;padding:20px 20px 44px;background:linear-gradient(to top,rgba(0,0,0,0.85) 60%,transparent);display:flex;justify-content:center;align-items:center;gap:32px;z-index:2;}
.shutter{width:72px;height:72px;border-radius:50%;border:4px solid rgba(255,255,255,0.9);background:transparent;cursor:pointer;position:relative;-webkit-tap-highlight-color:transparent;}
.shutter::after{content:'';position:absolute;top:5px;left:5px;right:5px;bottom:5px;border-radius:50%;background:rgba(255,255,255,0.95);transition:transform 0.15s;}
.shutter:active::after{transform:scale(0.85);}
.side-btn{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.12);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.upload{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px;background:var(--surface);}
.upload-box{width:90%;max-width:280px;aspect-ratio:1;border:2px dashed var(--border);border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;cursor:pointer;}
.upload-box:active{border-color:var(--accent);}
input[type=file]{display:none;}

/* Detail screen */
.detail{display:none;width:100%;min-height:100vh;flex-direction:column;background:var(--surface);}
.detail-photo{width:100%;height:200px;object-fit:cover;border-bottom:2px solid var(--accent);}
.detail-body{flex:1;padding:14px;overflow-y:auto;padding-bottom:100px;}
.section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin:12px 0 8px;}
.meal-type-row{display:flex;gap:6px;margin-bottom:12px;}
.meal-chip{flex:1;padding:10px 4px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);text-align:center;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.meal-chip.active{border-color:var(--accent);background:rgba(255,107,53,0.15);color:var(--accent);}
.meal-chip .emoji{font-size:18px;display:block;margin-bottom:2px;}
.item-row{background:var(--card);border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:border 0.15s;border:1.5px solid transparent;}
.item-row:active{border-color:var(--accent);}
.item-top{display:flex;justify-content:space-between;align-items:center;}
.item-name{font-size:13px;font-weight:500;max-width:55%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-right{text-align:right;}
.item-cal{font-size:14px;font-weight:700;color:var(--accent);}
.item-macro{font-size:9px;color:var(--muted);}
.item-edit{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.item-row.editing .item-edit{display:block;}
.item-row.editing{border-color:var(--accent);}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.edit-field{display:flex;flex-direction:column;gap:2px;}
.edit-field label{font-size:9px;color:var(--muted);text-transform:uppercase;}
.edit-field input{width:100%;padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;outline:none;}
.edit-field input:focus{border-color:var(--accent);}
.edit-name{grid-column:1/3;}
.item-del{margin-top:6px;font-size:11px;color:var(--muted);cursor:pointer;text-align:right;}
.item-del:active{color:var(--accent);}
.total-strip{background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;padding:12px;display:flex;justify-content:space-between;margin:10px 0;}
.total-strip .lbl{font-size:13px;font-weight:600;}
.total-strip .val{font-size:13px;font-weight:700;}
.notes-input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-family:inherit;resize:none;outline:none;min-height:44px;}
.notes-input::placeholder{color:var(--muted);}
.notes-input:focus{border-color:var(--accent);}
.detail-footer{position:fixed;bottom:0;left:0;right:0;padding:12px 14px 28px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:10px;}
.btn{flex:1;padding:14px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;text-align:center;}
.btn-go{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn-ghost{background:rgba(255,255,255,0.08);color:var(--text);}

/* Analyzing */
.analyzing{display:none;width:100%;height:100vh;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--surface);}
.pulse-ring{width:80px;height:80px;position:relative;}
.pulse-ring::before,.pulse-ring::after{content:'';position:absolute;border:3px solid var(--accent);border-radius:50%;top:0;left:0;right:0;bottom:0;}
.pulse-ring::before{animation:po 1.4s ease-out infinite;}
.pulse-ring::after{animation:po 1.4s ease-out 0.7s infinite;}
.pulse-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;}
@keyframes po{0%{transform:scale(0.8);opacity:1;}100%{transform:scale(1.6);opacity:0;}}

/* Success */
.success{display:none;width:100%;height:100vh;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--surface);}
</style>
</head>
<body>

<!-- 1. Camera -->
<div class="cam" id="camView">
  <div class="cam-top"><h3>&#127860; Snap your meal</h3><div class="sub">Center your plate in the frame</div></div>
  <video id="video" autoplay playsinline muted></video>
  <div class="crosshair"></div>
  <div class="upload" id="uploadFb" style="display:none">
    <div class="upload-box" id="uploadBox"><div style="font-size:56px">&#128248;</div><div style="font-size:14px;color:var(--muted)">Tap to pick a meal photo</div></div>
  </div>
  <input type="file" id="fileIn" accept="image/*" capture="environment">
  <canvas id="canvas"></canvas>
  <div class="cam-bottom">
    <button class="side-btn" onclick="document.getElementById('fileIn').click()">&#128444;</button>
    <button class="shutter" onclick="snap()"></button>
    <button class="side-btn" onclick="flip()">&#128260;</button>
  </div>
</div>

<!-- 2. Analyzing -->
<div class="analyzing" id="analyzingView">
  <div class="pulse-ring"><div class="pulse-icon">&#127869;</div></div>
  <p>Analyzing your meal...</p>
  <div style="font-size:12px;color:var(--muted)">Looking up USDA nutrition data</div>
</div>

<!-- 3. Detail (the main editing screen) -->
<div class="detail" id="detailView">
  <img class="detail-photo" id="detailPhoto">
  <div class="detail-body">
    <div class="section-title">Meal Type</div>
    <div class="meal-type-row" id="mealTypeRow">
      <div class="meal-chip active" data-type="breakfast" onclick="pickType(this)"><span class="emoji">&#127749;</span>Breakfast</div>
      <div class="meal-chip" data-type="lunch" onclick="pickType(this)"><span class="emoji">&#9728;</span>Lunch</div>
      <div class="meal-chip" data-type="dinner" onclick="pickType(this)"><span class="emoji">&#127769;</span>Dinner</div>
      <div class="meal-chip" data-type="snack" onclick="pickType(this)"><span class="emoji">&#127852;</span>Snack</div>
    </div>

    <div class="section-title">Food Items</div>
    <div id="itemsList"></div>
    <div class="total-strip" id="totalStrip"></div>

    <div class="section-title">Notes (optional)</div>
    <textarea class="notes-input" id="notesInput" placeholder="How was it? Any details to add..." rows="2"></textarea>
  </div>
  <div class="detail-footer">
    <button class="btn btn-ghost" onclick="retake()">Retake</button>
    <button class="btn btn-go" onclick="logIt()">&#9989; Log Meal</button>
  </div>
</div>

<!-- 4. Success -->
<div class="success" id="successView">
  <div style="font-size:56px">&#127881;</div>
  <div style="font-size:18px;color:var(--green);font-weight:600">Meal Logged!</div>
  <div style="font-size:13px;color:var(--muted)">Keep tracking, you're doing great</div>
</div>

<script>
var CID='nutrition-mcp',photoData=null,items=null,selectedType='breakfast',facing='environment';
function mcpCall(tool,args){args=args||{};return new Promise(function(res,rej){var rid='m-'+Date.now()+'-'+Math.random().toString(36).slice(2);function h(e){var d=e.data||{};if(d.source!=='adas-host')return;var m=d.message||{};if(m.type!=='mcp-result'||!m.payload||m.payload.requestId!==rid)return;window.removeEventListener('message',h);if(m.payload.error)rej(new Error(m.payload.error));else res(m.payload.result);}window.addEventListener('message',h);window.parent.postMessage({source:'adas-plugin',message:{action:'mcp-call',payload:{requestId:rid,connectorId:CID,tool:tool,args:args}}},'*');setTimeout(function(){window.removeEventListener('message',h);rej(new Error('timeout'));},60000);});}

// Camera
async function startCam(){try{var s=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing,width:{ideal:1280},height:{ideal:960}},audio:false});document.getElementById('video').srcObject=s;document.getElementById('uploadFb').style.display='none';document.getElementById('video').style.display='block';document.querySelector('.crosshair').style.display='block';}catch(e){document.getElementById('video').style.display='none';document.querySelector('.crosshair').style.display='none';document.getElementById('uploadFb').style.display='flex';}}
function flip(){facing=facing==='environment'?'user':'environment';var v=document.getElementById('video');if(v.srcObject)v.srcObject.getTracks().forEach(function(t){t.stop();});startCam();}
function snap(){var v=document.getElementById('video'),c=document.getElementById('canvas');c.width=v.videoWidth||640;c.height=v.videoHeight||480;c.getContext('2d').drawImage(v,0,0);photoData=c.toDataURL('image/jpeg',0.85);analyze();}
document.getElementById('uploadBox').addEventListener('click',function(){document.getElementById('fileIn').click();});
document.getElementById('fileIn').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){photoData=ev.target.result;analyze();};r.readAsDataURL(f);});

function retake(){photoData=null;items=null;show('camView');startCam();}

// Auto-guess meal type from time
function guessMeal(){var h=new Date().getHours();if(h<11)return'breakfast';if(h<15)return'lunch';if(h<21)return'dinner';return'snack';}

// Analyze photo
async function analyze(){
  show('analyzingView');
  selectedType=guessMeal();
  try{
    var desc=prompt('What foods are in this photo?\n(e.g. "grilled chicken, rice, salad")');
    if(!desc){retake();return;}
    var foods=desc.split(',').map(function(s){return s.trim();}).filter(Boolean);
    var r=await mcpCall('nutrition.lookupMultiple',{foods:foods});
    var data=typeof r==='string'?JSON.parse(r):r;
    if(data.results&&data.results.length>0){
      items=data.results.map(function(it){return{name:it.name,quantity:100,unit:'g',calories:it.calories,protein:it.protein,carbs:it.carbs,fat:it.fat,fiber:it.fiber||0,source:'photo-ai'};});
      showDetail();
    }else{alert('No nutrition data found. Try again.');retake();}
  }catch(e){alert('Failed: '+e.message);retake();}
}

// Detail screen
function showDetail(){
  document.getElementById('detailPhoto').src=photoData;
  // Set active meal type
  document.querySelectorAll('.meal-chip').forEach(function(c){c.classList.toggle('active',c.dataset.type===selectedType);});
  renderItems();
  show('detailView');
}

function pickType(el){
  selectedType=el.dataset.type;
  document.querySelectorAll('.meal-chip').forEach(function(c){c.classList.remove('active');});
  el.classList.add('active');
}

function renderItems(){
  var tot={cal:0,p:0,c:0,f:0};
  document.getElementById('itemsList').innerHTML=(items||[]).map(function(i,idx){
    tot.cal+=i.calories||0;tot.p+=i.protein||0;tot.c+=i.carbs||0;tot.f+=i.fat||0;
    return'<div class="item-row" onclick="toggleEdit(this,'+idx+')">'+
      '<div class="item-top"><div class="item-name">'+i.name+'</div><div class="item-right"><div class="item-cal">'+i.calories+' cal</div><div class="item-macro">P:'+i.protein+'g &middot; C:'+i.carbs+'g &middot; F:'+i.fat+'g</div></div></div>'+
      '<div class="item-edit"><div class="edit-grid">'+
        '<div class="edit-field edit-name"><label>Name</label><input value="'+i.name+'" onchange="updItem('+idx+\',\'name\',this.value)"></div>'+
        '<div class="edit-field"><label>Calories</label><input type="number" value="'+i.calories+'" onchange="updItem('+idx+\',\'calories\',+this.value)"></div>'+
        '<div class="edit-field"><label>Protein (g)</label><input type="number" value="'+i.protein+'" onchange="updItem('+idx+\',\'protein\',+this.value)"></div>'+
        '<div class="edit-field"><label>Carbs (g)</label><input type="number" value="'+i.carbs+'" onchange="updItem('+idx+\',\'carbs\',+this.value)"></div>'+
        '<div class="edit-field"><label>Fat (g)</label><input type="number" value="'+i.fat+'" onchange="updItem('+idx+\',\'fat\',+this.value)"></div>'+
      '</div><div class="item-del" onclick="event.stopPropagation();delItem('+idx+')">&#128465; Remove item</div></div></div>';
  }).join('');
  document.getElementById('totalStrip').innerHTML='<div class="lbl">&#127860; Total</div><div class="val">'+tot.cal+' cal &middot; '+tot.p+'g P &middot; '+tot.c+'g C &middot; '+tot.f+'g F</div>';
}
function toggleEdit(el,idx){el.classList.toggle('editing');}
function updItem(idx,field,val){if(items[idx]){items[idx][field]=val;renderItems();}}
function delItem(idx){items.splice(idx,1);renderItems();}

// Log
async function logIt(){
  if(!items)return;
  try{
    var notes=document.getElementById('notesInput').value.trim()||null;
    await mcpCall('nutrition.logMeal',{meal_type:selectedType,items:items,notes:notes});
    show('successView');
    setTimeout(retake,2500);
  }catch(e){alert('Failed: '+e.message);}
}

function show(id){['camView','analyzingView','detailView','successView'].forEach(function(v){document.getElementById(v).style.display=v===id?'flex':'none';});}
window.addEventListener('message',function(e){var d=e.data||{};if(d.source==='adas-host'&&d.message?.type==='plugin.command')startCam();});
startCam();
</script>
</body>
</html>
