<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Daily News</title>
<style>
  :root{
    --bg:#0f1117; --surface:#171a21; --border:#252a35;
    --text:#e8eaf0; --text-muted:#8b93a7; --accent:#4f8ef7;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.5}
  #app{max-width:680px;margin:0 auto;min-height:100vh}
  .header{padding:16px 16px 10px;border-bottom:1px solid var(--border)}
  .title{font-size:20px;font-weight:700}
  .subtitle{font-size:13px;color:var(--text-muted);margin-top:2px}
  .body{padding:14px 14px 28px}
  .empty{color:var(--text-muted);text-align:center;padding:48px 16px}
  .category{margin-bottom:18px}
  .cat-header{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
  .story{display:block;padding:7px 0;border-bottom:1px solid var(--surface);text-decoration:none}
  .story:last-child{border-bottom:none}
  .story-title{color:var(--accent);font-size:14px;font-weight:500;line-height:1.35}
  .meta{font-size:11px;color:var(--text-muted);margin-top:3px}
  .pts{color:var(--accent);font-weight:600}
  .btn{display:block;margin:6px auto 0;padding:9px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-weight:600;font-size:13px;cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="title">📰 Daily News</div>
    <div class="subtitle" id="date"></div>
  </div>
  <div class="body" id="body"><p class="empty">Loading today's news…</p></div>
</div>
<script>
  // Default/fallback data — replaced by host-pushed data or a live mcp-call.
  let data = { date: '', categories: [] };

  function esc(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function prettyDate(d){
    try { var dt = d ? new Date(d + 'T00:00:00') : new Date();
      return dt.toLocaleDateString(undefined, { weekday:'long', month:'short', day:'numeric' }); }
    catch(e){ return d || ''; }
  }

  function render(){
    document.getElementById('date').textContent = prettyDate(data.date);
    var body = document.getElementById('body');
    var cats = Array.isArray(data.categories) ? data.categories : [];
    if(!cats.length){ body.innerHTML = '<p class="empty">No stories yet.</p>'; return; }
    var html = '';
    cats.forEach(function(cat){
      var items = cat.items || [];
      if(!items.length) return;
      html += '<div class="category"><div class="cat-header">' + esc((cat.emoji ? cat.emoji + '  ' : '') + (cat.name || cat.key)) + '</div>';
      items.forEach(function(s){
        var pts = s.points ? '<span class="pts">▲ ' + esc(s.points) + '</span>  ·  ' : '';
        html += '<a class="story" href="' + encodeURI(s.url || '#') + '" target="_blank" rel="noopener noreferrer">'
             +  '<div class="story-title">' + esc(s.title) + '</div>'
             +  '<div class="meta">' + pts + esc(s.source || '') + '</div></a>';
      });
      html += '</div>';
    });
    html += '<button class="btn" id="refreshBtn">↻ Refresh</button>';
    body.innerHTML = html;
    var rb = document.getElementById('refreshBtn');
    if(rb) rb.addEventListener('click', fetchNews);
  }

  // ── postMessage protocol (adas-plugin ↔ adas-host) ──
  const callbacks = {};
  function mcpCall(tool, args, cb){
    const requestId = 'req_' + Math.random().toString(36).slice(2);
    if(cb) callbacks[requestId] = cb;
    window.parent.postMessage({ source:'adas-plugin', message:{ action:'mcp-call', payload:{ requestId, toolName: tool, args: args || {} } } }, '*');
  }
  function fetchNews(){
    mcpCall('news.fetch', { per_category: 4 }, function(err, result){
      if(err) return;
      var d = result;
      try { if(typeof d === 'string') d = JSON.parse(d); } catch(e){}
      if(d && d.content && d.content[0] && typeof d.content[0].text === 'string'){ try { d = JSON.parse(d.content[0].text); } catch(e){} }
      if(d && Array.isArray(d.categories)){ data = d; render(); }
    });
  }
  window.addEventListener('message', function(ev){
    var msg = ev.data && ev.data.message;
    if(!ev.data || ev.data.source !== 'adas-host' || !msg) return;
    if(msg.type === 'mcp-result'){
      var p = msg.payload || {};
      if(callbacks[p.requestId]){ callbacks[p.requestId](null, p.result); delete callbacks[p.requestId]; }
    } else if(msg.type === 'init' || msg.type === 'data'){
      if(msg.payload && Array.isArray(msg.payload.categories)){ data = msg.payload; render(); }
    }
  });

  // Handshake, then try a live fetch (web). On mobile the host pushes data via init.
  window.parent.postMessage({ source:'adas-plugin', message:{ action:'ready' } }, '*');
  render();
  fetchNews();
</script>
</body>
</html>
