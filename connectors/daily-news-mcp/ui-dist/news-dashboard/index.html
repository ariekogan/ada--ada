<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Daily News</title>
<style>
  :root{
    --bg:#f4efe7; --surface:#ffffff; --border:#ece4d7;
    --text:#2b2f38; --text-muted:#9a8f7d; --accent:#d9722e; --link:#c2541f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  #app{max-width:680px;margin:0 auto;min-height:100vh;padding:0 14px 28px}
  .header{padding:18px 4px 12px}
  .title{font-size:22px;font-weight:800;letter-spacing:-0.01em;display:flex;align-items:center;gap:8px}
  .subtitle{font-size:13px;color:var(--text-muted);margin-top:3px}
  .empty{color:var(--text-muted);text-align:center;padding:48px 16px}
  .category{margin-bottom:18px}
  .cat-header{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);margin:0 4px 9px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 1px 2px rgba(43,47,56,.04)}
  .story{display:block;padding:12px 14px;text-decoration:none;border-bottom:1px solid var(--border)}
  .story:last-child{border-bottom:none}
  .story:active{background:#faf6ef}
  .story-title{color:var(--text);font-size:14.5px;font-weight:600;line-height:1.35}
  .meta{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--text-muted);margin-top:5px}
  .pts{display:inline-flex;align-items:center;gap:3px;color:var(--accent);font-weight:700;background:#fbeede;border-radius:999px;padding:1px 8px}
  .src{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .btn{display:block;margin:14px auto 0;padding:10px 20px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);font-weight:700;font-size:13px;cursor:pointer}
  .btn:active{background:#faf6ef}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="title">📰 Daily News</div>
    <div class="subtitle" id="date"></div>
  </div>
  <div id="body"><p class="empty">Loading today's news…</p></div>
</div>
<script>
  // Sample first-paint — shows representative structure in static previews.
  // Replaced by host-pushed data (init) or the live news.fetch result on device.
  let data = {
    date: '',
    sample: true,
    categories: [
      { key: 'ai', name: 'AI & Machine Learning', emoji: '🤖', items: [
        { title: 'Open-source model tops the latest reasoning benchmarks', url: 'https://news.ycombinator.com', source: 'example.com', points: 842 },
        { title: 'New speculative-decoding trick speeds up LLM inference', url: 'https://news.ycombinator.com', source: 'example.com', points: 511 },
      ]},
      { key: 'security', name: 'Security & Privacy', emoji: '🔐', items: [
        { title: 'Widespread auth bypass disclosed; patch available', url: 'https://news.ycombinator.com', source: 'example.com', points: 333 },
      ]},
      { key: 'startups', name: 'Startups & Business', emoji: '🚀', items: [
        { title: 'Hardware startup acquires satellite operator', url: 'https://news.ycombinator.com', source: 'example.com', points: 174 },
      ]},
      { key: 'dev', name: 'Software & Dev', emoji: '💻', items: [
        { title: 'A deep dive into what happens when you run a GPU kernel', url: 'https://news.ycombinator.com', source: 'example.com', points: 118 },
      ]},
    ],
  };

  function esc(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function prettyDate(d){
    try { var dt = d ? new Date(d + 'T00:00:00') : new Date();
      return dt.toLocaleDateString(undefined, { weekday:'long', month:'short', day:'numeric' }); }
    catch(e){ return d || ''; }
  }

  function render(){
    document.getElementById('date').textContent = prettyDate(data.date);
    var body = document.getElementById('body');
    var cats = Array.isArray(data.categories) ? data.categories : [];
    if(!cats.length){ body.innerHTML = '<p class="empty">No stories yet.</p>'; return; }
    var html = '';
    cats.forEach(function(cat){
      var items = cat.items || [];
      if(!items.length) return;
      html += '<div class="category"><div class="cat-header">' + esc((cat.emoji ? cat.emoji + ' ' : '') + (cat.name || cat.key)) + '</div><div class="card">';
      items.forEach(function(s){
        var pts = s.points ? '<span class="pts">🔥 ' + esc(s.points) + '</span>' : '';
        html += '<a class="story" href="' + encodeURI(s.url || '#') + '" target="_blank" rel="noopener noreferrer">'
             +  '<div class="story-title">' + esc(s.title) + '</div>'
             +  '<div class="meta">' + pts + '<span class="src">' + esc(s.source || '') + '</span></div></a>';
      });
      html += '</div></div>';
    });
    html += '<button class="btn" id="refreshBtn">↻ Refresh</button>';
    body.innerHTML = html;
    var rb = document.getElementById('refreshBtn');
    if(rb) rb.addEventListener('click', fetchNews);
  }

  // ── postMessage protocol (adas-plugin ↔ adas-host) ──
  const callbacks = {};
  function mcpCall(tool, args, cb){
    const requestId = 'req_' + Math.random().toString(36).slice(2);
    if(cb) callbacks[requestId] = cb;
    window.parent.postMessage({ source:'adas-plugin', message:{ action:'mcp-call', payload:{ requestId, toolName: tool, args: args || {} } } }, '*');
  }
  function fetchNews(){
    mcpCall('news.fetch', { per_category: 4 }, function(err, result){
      if(err) return;
      var d = result;
      try { if(typeof d === 'string') d = JSON.parse(d); } catch(e){}
      if(d && d.content && d.content[0] && typeof d.content[0].text === 'string'){ try { d = JSON.parse(d.content[0].text); } catch(e){} }
      if(d && Array.isArray(d.categories)){ data = d; render(); }
    });
  }
  window.addEventListener('message', function(ev){
    var msg = ev.data && ev.data.message;
    if(!ev.data || ev.data.source !== 'adas-host' || !msg) return;
    if(msg.type === 'mcp-result'){
      var p = msg.payload || {};
      if(callbacks[p.requestId]){ callbacks[p.requestId](null, p.result); delete callbacks[p.requestId]; }
    } else if(msg.type === 'init' || msg.type === 'data'){
      if(msg.payload && Array.isArray(msg.payload.categories)){ data = msg.payload; render(); }
    }
  });

  window.parent.postMessage({ source:'adas-plugin', message:{ action:'ready' } }, '*');
  render();
  fetchNews();
</script>
</body>
</html>
